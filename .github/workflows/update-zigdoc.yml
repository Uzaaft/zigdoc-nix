name: Update zigdoc release

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Check for new zigdoc release
        id: check
        run: |
          CURRENT_TAG=$(grep -oP "rev = \"v\K[^\"]*" flake.nix)
          LATEST_TAG=$(curl -sL "https://api.github.com/repos/rockorager/zigdoc/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')

          echo "current=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_TAG" = "$LATEST_TAG" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix
        if: steps.check.outputs.updated == 'true'
        run: |
          NEW_TAG="${{ steps.check.outputs.latest }}"
          NEW_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/rockorager/zigdoc/archive/refs/tags/v${NEW_TAG}.tar.gz" 2>/dev/null \
            | xargs nix hash convert --hash-algo sha256 --to sri)

          sed -i "s|version = \".*\";|version = \"${NEW_TAG}\";|" flake.nix
          sed -i "s|rev = \"v.*\";|rev = \"v${NEW_TAG}\";|" flake.nix
          sed -i "s|hash = \"sha256-.*\";|hash = \"${NEW_HASH}\";|" flake.nix

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update zigdoc to v${{ steps.check.outputs.latest }}"
          git push
